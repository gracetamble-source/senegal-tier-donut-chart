<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Senegal MTF Tier Donut Chart</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: white;
      color: #2E5C73;
    }

    .controls {
    margin-left: 90px;
    margin-top: 60px;
    margin-bottom: -90px;
    font-size: 16px;
    color: #2E5C73;
    }

    select {
      padding: 4px 8px;
      font-size: 16px;
      margin-left: 6px;
      color: #2E5C73;
      border: 1px solid #aaa;
      border-radius: 4px;
    }

    .chart-title {
      margin-left: 90px;
      margin-bottom: -40px;
      padding-top: 20px;
      font-size: 42px;
      font-weight: 700;
      color: #2E5C73;
    }

    svg {
      width: 900px;
      height: 620px;
      display: block;
    }

    .legend text {
      font-size: 18px;
      fill: #2E5C73;
    }

    .slice-label {
      font-size: 16px;
      font-weight: 700;
      fill: white;
      pointer-events: none;
    }

    .tooltip {
      position: absolute;
      background: white;
      border: 1px solid #ccc;
      padding: 8px 10px;
      font-size: 13px;
      pointer-events: none;
      opacity: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      color: #2E5C73;
    }

  </style>
</head>

<body>

<h2 class="chart-title">Senegal</h2>

<div class="controls">
  Year:
  <select id="year-select"></select>
</div>

<svg width="900" height="620"></svg>

<div class="tooltip"></div>

<script src="script.js"></script>

</body>
</html>
